---
argument_specs:
  main:
    short_description: Configure a personal account on remote Linux servers
    description:
      - Creates a group and a personal user, grants the group passwordless
        sudo, installs the user's SSH key and vim.
    options:
      profile_name:
        type: str
        required: true
        description: Login name of the personal user to create.
      profile_group:
        type: str
        required: true
        description: Group granted passwordless sudo via a sudoers drop-in.
      profile_key:
        type: str
        required: true
        description: >-
          SSH public key(s) for the user's authorized_keys. Accepts a raw key
          string or an HTTP(S) URL (e.g. a GitHub .keys endpoint).
      profile_user_shell:
        type: str
        required: false
        default: /bin/bash
        description: Login shell for the personal user.
      profile_password:
        type: str
        required: false
        no_log: true
        description: >-
          Optional password for the user (ideally supplied via ansible-vault).
          When omitted, the password is left untouched.

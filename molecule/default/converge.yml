---
- name: Converge
  hosts: all
  become: true

  # Test-only values: a static SSH key (no network dependency on GitHub) and a
  # throwaway password so the user-creation task is actually exercised.
  vars:
    profile_password: "molecule-test-passw0rd"
    profile_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN+moleculeTestKeyDoNotUseInProduction000000000000 molecule@test"

  pre_tasks:
    - name: Update apt cache.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_os_family == 'Debian'

    - name: Wait for systemd to complete initialization.  # noqa: command-instead-of-module
      ansible.builtin.command: systemctl is-system-running
      register: systemctl_status
      until: >
        'running' in systemctl_status.stdout or
        'degraded' in systemctl_status.stdout
      retries: 30
      delay: 5
      when: ansible_service_mgr == 'systemd'
      changed_when: false
      failed_when: systemctl_status.rc > 1

  roles:
    - role: jtprogru.profile
